[project]
name = "django-app-1"
version = "0.1.0"
description = "Demo django app for Ox-Orch integration tests"
requires-python = ">=3.10"

dependencies = ["Django>=5"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
