[project]
name = "demo-2"
version = "0.1.0"
description = "Demo package 2 for Ox-Orch integration tests"
requires-python = ">=3.8"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
